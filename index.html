<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catálogo Online - André Waldige</title>
    <meta name="description" content="Catálogo online profissional." />
    <link rel="icon" type="image/jpeg" href="Catalogodeprodutosonline.jpg">
    
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>

    <div id="cart-overlay" class="cart-overlay hidden"></div>

    <header>
        <div class="header-content">
            <h1>Catálogo Online</h1>
            <p>Sua vitrine digital, elegante e funcional.</p>
        </div>
    </header>

    <main>
        <section id="admin-access-section">
            <button id="btnShowAdminPanel" class="button button-primary">
                <i class="fa fa-lock"></i> Entrar como Admin
            </button>
            <button id="btnHideAdminPanel" class="button button-secondary hidden">
                <i class="fa fa-sign-out-alt"></i> Sair do modo Admin
            </button>
        </section>

        <section id="search-section">
            <div class="search-container">
                <div class="search-box">
                    <i class="fa fa-search"></i>
                    <input type="text" id="search-input" placeholder="O que você procura hoje?" />
                </div>
                <div class="filter-box">
                    <select id="category-filter">
                        <option value="all">Todas as Categorias</option>
                        <option value="Feminino">Feminino</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Infantil">Infantil</option>
                        <option value="Beleza">Beleza</option>
                        <option value="Jeans">Jeans</option>
                        <option value="Calçados">Calçados</option>
                        <option value="Esportivo">Esportivo</option>
                        <option value="Moda Praia">Moda Praia</option>
                        <option value="Moda Íntima">Moda Íntima</option>
                    </select>
                    <button id="search-button" class="button button-primary">Buscar</button>
                </div>
            </div>
        </section>

        <section id="product-list">
            <div class="products-container" id="products-container">
                </div>
            <div id="pagination" class="pagination"></div>
        </section>

        <div id="cart-sidebar" class="cart-sidebar hidden">
            <div class="cart-header">
                <h3><i class="fa fa-shopping-cart"></i> Meu Carrinho</h3>
                <button id="close-cart" class="close-cart-btn">&times;</button>
            </div>
            
            <div id="cart-items-container" class="cart-body">
                <p id="empty-cart-message">Seu carrinho está vazio.</p>
            </div>

            <div class="cart-footer">
                <div class="cart-total-row">
                    <span>Total:</span>
                    <span id="cart-total">R$ 0,00</span>
                </div>
                <button id="checkout-button" class="button button-success btn-block">
                    <i class="fab fa-whatsapp"></i> Finalizar no WhatsApp
                </button>
            </div>
        </div>

        <section id="add-product-section" class="hidden">
            <form id="add-product-form">
                <h3 id="productFormTitle">Gerenciar Produto</h3>
                <input type="hidden" id="product-id" />
                <input type="text" id="name" placeholder="Nome do Produto" required />
                <textarea id="description" placeholder="Descrição Detalhada"></textarea>
                <div class="form-row">
                    <input type="number" id="price" step="0.01" placeholder="Preço (Ex: 99.90)" required />
                    <input type="number" id="stock" placeholder="Estoque" />
                </div>
                <input type="text" id="imageUrl" placeholder="Link da Imagem (URL)" />
                <select id="category" required>
                    <option value="">Selecione a Categoria</option>
                    <option value="Feminino">Feminino</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Infantil">Infantil</option>
                    </select>
                <button type="submit" class="button button-success">Salvar Produto</button>
            </form>
        </section>
    </main>

    <footer class="footer-simple">
        <div class="footer-container">
            <p class="copyright">
                &copy; <span id="current-year"></span> <strong>André Waldige</strong> 
                <span class="separator">|</span> Catálogo Profissional
            </p>
        </div>
    </footer>

    <div id="floating-cart" class="floating-cart">
        <i class="fa fa-shopping-basket"></i>
        <span id="cart-count-badge">0</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
