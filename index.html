<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catálogo Online - André Waldige</title>
  <meta name="description" content="Catálogo online profissional." />
  <link rel="icon" type="image/jpeg" href="Catalogodeprodutosonline.jpg">
  
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>

  <header>
    <div class="header-content">
      <h1>Catálogo Online</h1>
      <p>Sua vitrine digital, elegante e funcional.</p>
    </div>
  </header>

  <main>
    <section id="admin-access-section">
      <button id="btnShowAdminPanel" class="button button-primary">Entrar como Admin</button>
      <button id="btnHideAdminPanel" class="button button-secondary hidden">Sair do modo Admin</button>
    </section>

    <section id="search-section">
      <h2>Encontrar Produtos</h2>
      <div class="search-bar">
        <select id="category-filter">
          <option value="all">Todas as Categorias</option>
          <option value="Feminino">Feminino</option>
          <option value="Masculino">Masculino</option>
          <option value="Infantil">Infantil</option>
          <option value="Beleza">Beleza</option>
          <option value="Jeans">Jeans</option>
          <option value="Calçados">Calçados</option>
          <option value="Esportivo">Esportivo</option>
          <option value="Moda Praia">Moda Praia</option>
          <option value="Moda Íntima">Moda Íntima</option>
        </select>
        <input type="text" id="search-input" placeholder="O que você procura?" />
        <button id="search-button" class="button button-primary">Buscar</button>
      </div>
    </section>

    <section id="product-list">
      <div class="products-container" id="products-container">
        </div>
      <div id="pagination" class="pagination"></div>
    </section>

    <section id="shopping-cart-section" class="hidden">
      <h2>Seu Carrinho (<span id="cart-item-count">0</span>)</h2>
      <div class="cart-items-container" id="cart-items-container">
        <p id="empty-cart-message">Seu carrinho está vazio.</p>
      </div>
      <div class="cart-summary">
        <h3>Total: <span id="cart-total">R$ 0,00</span></h3>
        <button id="checkout-button" class="button button-success">Finalizar no WhatsApp</button>
      </div>
    </section>

    <section id="add-product-section" class="hidden">
      <form id="add-product-form">
        <h3 id="productFormTitle">Gerenciar Produto</h3>
        <input type="hidden" id="product-id" />
        <input type="text" id="name" placeholder="Nome" required />
        <textarea id="description" placeholder="Descrição"></textarea>
        <input type="number" id="price" step="0.01" placeholder="Preço" required />
        <input type="text" id="imageUrl" placeholder="URL da Imagem" />
        <input type="number" id="stock" placeholder="Estoque" />
        <select id="category" required>
            <option value="">Categoria</option>
            <option value="Feminino">Feminino</option>
            <option value="Masculino">Masculino</option>
            <option value="Infantil">Infantil</option>
            </select>
        <button type="submit" class="button button-success">Salvar</button>
      </form>
    </section>
  </main>

  <footer class="footer-simple">
    <div class="footer-container">
      <p class="copyright">
        &copy; <span id="current-year"></span> <strong>Catálogo Online</strong> 
        <span class="separator">|</span> André Waldige
      </p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
